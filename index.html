    <nav class="navbar">

    <section class="hero">
        <div class="hero-content">
            <h1>L'Apprentissage Personnalisé<br><span class="highlight">pour Tous</span></h1>
            <p>L'IA révolutionne l'éducation en adaptant chaque parcours à vos besoins.</p>
            <div class="cta-buttons">
                <a href="#stats" class="btn-primary">Les avantages</a>
            </div>
        </div>
    </section>

    <section id="stats" class="stats">
        <div class="container">
            <h2>Les Avantages Concrets</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-number" data-target="85">0%</div>
                    <p>Amélioration<br>résultats</p>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-heart"></i></div>
                    <div class="stat-number" data-target="60">0%</div>
                    <p>Engagement<br>élèves</p>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-number" data-target="40">0%</div>
                    <p>Temps gagné</p>
                </div>
            </div>
            <div class="chart-container">
                <h3>Comparaison Performances</h3>
                <canvas id="advantagesChart"></canvas>
            </div>
        </div>
    </section>
